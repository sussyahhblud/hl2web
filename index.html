<!doctype html>
<html lang="en-us">
	<head>
		<meta charset="utf-8" />
		<meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
		<title>web hl2</title>
		<link rel="manifest" href="manifest.webmanifest" />
		<meta name="theme-color" content="#111111" />
		<link rel="apple-touch-icon" href="assets/icon-192.png" />
		<style>
			body {
  font-family: arial;
  margin: 0;
  padding: none;
}

.emscripten { padding-right: 0; margin-left: auto; margin-right: auto; display: block; }
div.emscripten { text-align: center; }
div.emscripten_border { border: 1px solid black; }
/* the canvas *must not* have any border or padding, or mouse coords will be wrong */
canvas.emscripten { border: 0px none; background-color: black; }

#emscripten_logo {
  display: inline-block;
  margin: 0;
  padding: 6px;
  width: 265px;
}

.spinner {
  height: 30px;
  width: 30px;
  margin: 0;
  margin-top: 20px;
  margin-left: 20px;
  display: inline-block;
  vertical-align: top;

  -webkit-animation: rotation .8s linear infinite;
  -moz-animation: rotation .8s linear infinite;
  -o-animation: rotation .8s linear infinite;
  animation: rotation 0.8s linear infinite;

  border-left: 5px solid rgb(235, 235, 235);
  border-right: 5px solid rgb(235, 235, 235);
  border-bottom: 5px solid rgb(235, 235, 235);
  border-top: 5px solid rgb(120, 120, 120);

  border-radius: 100%;
  background-color: rgb(189, 215, 46);
}

@-webkit-keyframes rotation {
  from {-webkit-transform: rotate(0deg);}
  to {-webkit-transform: rotate(360deg);}
}
@-moz-keyframes rotation {
  from {-moz-transform: rotate(0deg);}
  to {-moz-transform: rotate(360deg);}
}
@-o-keyframes rotation {
  from {-o-transform: rotate(0deg);}
  to {-o-transform: rotate(360deg);}
}
@keyframes rotation {
  from {transform: rotate(0deg);}
  to {transform: rotate(360deg);}
}

#status {
  display: inline-block;
  vertical-align: top;
  margin-top: 30px;
  margin-left: 20px;
  font-weight: bold;
  color: rgb(120, 120, 120);
}

#progress {
  height: 20px;
  width: 300px;
}

#controls {
  display: inline-block;
  float: right;
  vertical-align: top;
  margin-top: 30px;
  margin-right: 20px;
}

#output {
  width: 100%;
  height: 200px;
  margin: 0 auto;
  margin-top: 10px;
  border-left: 0px;
  border-right: 0px;
  padding-left: 0px;
  padding-right: 0px;
  display: block;
  background-color: black;
  color: white;
  font-family: 'Lucida Console', Monaco, monospace;
  outline: none;
}

		</style>
		<style>
			body {
				background: #111;
				color: #fff;
			}

			body #emscripten_logo {
				width: 100px;
			}
		</style>
	<script defer data-domain="hl2.slqnt.dev" src="https://analytics.proudparrot2.com/js/script.js"></script>
	</head>
	<body>
		<img id="emscripten_logo" src="assets/hl2.png" alt="" />

		<div class="spinner" id="spinner"></div>
		<div class="emscripten" id="status">Downloading...</div>

		<span id="controls">
			<span
				><input
					type="button"
					value="Fullscreen"
					onclick="document.getElementById('canvas').requestFullscreen().catch(() => {})"
				/>
			</span>
		</span>

		<div class="emscripten">
			<progress value="0" max="100" id="progress" hidden="1"></progress>
		</div>

		<div class="emscripten_border">
			<canvas
				class="emscripten"
				id="canvas"
				oncontextmenu="event.preventDefault()"
				tabindex="-1"
			></canvas>
		</div>

		<script type="text/javascript">
			var statusElement = document.getElementById("status");
			var progressElement = document.getElementById("progress");
			var spinnerElement = document.getElementById("spinner");
			var canvasElement = document.getElementById("canvas");

			canvasElement.addEventListener(
				"webglcontextlost",
				(e) => {
					alert("WebGL context lost. You will need to reload the page.");
					e.preventDefault();
				},
				false,
			);

			// Keep keyboard focus on the game while the canvas is selected: stop Tab from
			// moving focus to page chrome (which is how stray Enter presses ended up
			// activating links/buttons and prompting a reload). The game still receives
			// these keys via its own input handler; this only blocks the browser default.
			canvasElement.addEventListener("keydown", (e) => {
				if (e.key === "Tab") e.preventDefault();
			});

			canvasElement.widthNative = screen.availWidth;
			canvasElement.heightNative = screen.availHeight;

			var Module = {
				print(...args) {
					console.log(...args);
				},
				canvas: canvasElement,
				setStatus(text) {
					Module.setStatus.last ??= { time: Date.now(), text: "" };
					if (text === Module.setStatus.last.text) return;
					var m = text.match(/([^(]+)\((\d+(\.\d+)?)\/(\d+)\)/);
					var now = Date.now();
					// if this is a progress update, skip it if too soon
					if (m && now - Module.setStatus.last.time < 30) return;
					Module.setStatus.last.time = now;
					Module.setStatus.last.text = text;
					if (m) {
						text = m[1];
						progressElement.value = parseInt(m[2]) * 100;
						progressElement.max = parseInt(m[4]) * 100;
						progressElement.hidden = false;
						spinnerElement.hidden = false;
					} else {
						progressElement.value = null;
						progressElement.max = null;
						progressElement.hidden = true;
						if (!text) spinnerElement.style.display = "none";
					}
					statusElement.innerHTML = text;
				},
				totalDependencies: 0,
				monitorRunDependencies(left) {
					this.totalDependencies = Math.max(this.totalDependencies, left);
					Module.setStatus(
						left
							? "Preparing... (" +
									(this.totalDependencies - left) +
									"/" +
									this.totalDependencies +
									")"
							: "All downloads complete.",
					);
				},
			};
			Module.setStatus("Downloading...");
			window.onerror = (event) => {
				// TODO: do not warn on ok events like simulating an infinite loop or exitStatus
				Module.setStatus("Exception thrown, see JavaScript console");
				spinnerElement.style.display = "none";
				Module.setStatus = (text) => {
					if (text) console.error("[post-exception status] " + text);
				};
			};

			if ("serviceWorker" in navigator) {
				window.addEventListener("load", () => {
					navigator.serviceWorker
						.register("sw.js")
						.catch((e) => console.warn("SW registration failed", e));
				});
			}
		</script>
		<script async type="text/javascript" src="hl2_launcher.js"></script>

</body>
</html>
